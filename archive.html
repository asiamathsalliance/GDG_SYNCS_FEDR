<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TaskFlow - Archive</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/pages.css" />
</head>
<body>
<div class="shell">

  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">⚡</div>
      <span class="logo-text">TaskFlow</span>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">Menu</div>
      <a href="index.html" class="nav-item">
        <span class="nav-icon">🏠</span> Dashboard
      </a>
      <a href="tasks.html" class="nav-item">
        <span class="nav-icon">✅</span> Tasks
        <span class="nav-badge" id="sidebar-task-count">0</span>
      </a>
      <a href="archive.html" class="nav-item active">
        <span class="nav-icon">📦</span> Archive
      </a>
      <a href="settings.html" class="nav-item">
        <span class="nav-icon">⚙️</span> Settings
      </a>
    </div>
    <div class="sidebar-footer">
      <div class="user-card">
        <div class="avatar">JD</div>
        <div class="user-info">
          <div class="user-name">Jamie Doe</div>
          <div class="user-role">Developer</div>
        </div>
      </div>
    </div>
  </aside>

  <div class="content">
    <header class="topbar">
      <h1 class="topbar-title">Archive</h1>
      <div class="topbar-actions">
        <button class="btn btn-ghost" id="btn-logout" type="button">Logout</button>
        <button class="btn btn-ghost" id="btn-role-chip" type="button">Member</button>
        <a href="tasks.html" class="btn btn-primary">+ New Task</a>
      </div>
    </header>

    <main class="page-body">
      <div class="card">
        <div class="card-header">
          <span class="card-title">Archived Tasks</span>
          <input type="text" id="archive-search" class="search-box" placeholder="Search archived tasks..." style="max-width:260px;" />
        </div>
        <table class="table">
          <thead>
            <tr>
              <th>Title</th><th>Priority</th><th>Due Date</th><th>Status</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="archive-list">
            <tr>
              <td colspan="5" style="text-align:center;color:var(--text-muted);padding:2rem;">Archive is empty.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>
</div>

<div class="toast-container"></div>
<script src="js/app.js"></script>
<script src="js/ui.js"></script>
<script>
  applyUserChrome();
  document.getElementById('btn-logout')?.addEventListener('click', () => {
    localStorage.removeItem('tf_user');
    window.location.href = 'index.html';
  });
  const count = loadTasks().filter(t => !t.archived && !t.done).length;
  const badge = document.getElementById('sidebar-task-count');
  if (badge) badge.textContent = count;
</script>
</body>
</html>
